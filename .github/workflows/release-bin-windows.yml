name: Release the Compiled Application (Windows)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Determine inputs
        id: inputs
        shell: pwsh
        run: |
          echo "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT

      - name: Publish CMD app
        run: dotnet publish ./FlacHasher.Cmd/FlacHasher.Cmd.csproj --configuration Release --runtime win-x64 --output ./out/cmd

      - name: Publish Win app
        run: dotnet publish ./FlacHasher.Win/FlacHasher.Win.csproj --configuration Release --runtime win-x64 --output ./out/win

      - name: Verify publish outputs
        shell: pwsh
        run: |
          foreach ($dir in './out/cmd', './out/win') {
            $exes = Get-ChildItem -Path $dir -Filter *.exe
            if ($exes.Count -eq 0) {
              Write-Error "No .exe files found in publish output directory '$dir'"
              exit 1
            }
          }

      - name: Zip release binaries
        shell: pwsh
        run: |
          $tag = "${{ steps.inputs.outputs.tag }}"
          Compress-Archive -Path ./out/cmd/* -DestinationPath "flachasher-cmd-$tag-win-x64.zip"
          Compress-Archive -Path ./out/win/* -DestinationPath "flachasher-win-$tag-win-x64.zip"

      - name: Generate checksums
        shell: pwsh
        run: |
          $tag = "${{ steps.inputs.outputs.tag }}"
          foreach ($zip in "flachasher-cmd-$tag-win-x64.zip", "flachasher-win-$tag-win-x64.zip") {
            $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
            "$hash  $zip" | Out-File -FilePath "$zip.sha256" -Encoding ascii -NoNewline
          }

      - name: Upload release artifacts
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.inputs.outputs.tag }}"
          gh release upload $tag `
            "flachasher-cmd-$tag-win-x64.zip" `
            "flachasher-cmd-$tag-win-x64.zip.sha256" `
            "flachasher-win-$tag-win-x64.zip" `
            "flachasher-win-$tag-win-x64.zip.sha256"
